<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 1</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url('https://i.pinimg.com/736x/8c/38/9b/8c389bdf4189c64343f5f06d71800705.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
       
        .text {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            max-width: 80%;
        }

        h1, h2 {
            margin: 10px 0;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.8);
        }

        marquee {
            width: 100%;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="text">
        <marquee behavior="alternate" scrollamount="12" direction="left">
            <h2>Activity 1</h2>
        </marquee>
        
        <!-- You can add more content here -->
        <h1>Welcome!</h1>
        <p>Your content goes here...</p>
    </div>
</body>
</html>
